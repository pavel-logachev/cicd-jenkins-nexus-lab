services:
  jenkins:
    build:
      context: ./jenkins
    container_name: sdvps-jenkins
    user: root
    restart: unless-stopped
    ports:
      - "8088:8080"
      - "50000:50000"
    environment:
      JAVA_OPTS: -Djenkins.install.runSetupWizard=false
      CASC_JENKINS_CONFIG: /var/jenkins_home/casc.yaml
      JENKINS_ADMIN_ID: ${JENKINS_ADMIN_ID}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD}
      NEXUS_ADMIN_PASSWORD: ${NEXUS_ADMIN_PASSWORD}
    volumes:
      - jenkins-data:/var/jenkins_home
      - ./jenkins/casc.yaml:/var/jenkins_home/casc.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - cicd

  nexus:
    image: sonatype/nexus3:3.82.0
    container_name: sdvps-nexus
    restart: unless-stopped
    ports:
      - "8089:8081"
    volumes:
      - nexus-data:/nexus-data
    networks:
      - cicd

  nexus-bootstrap:
    image: curlimages/curl:8.16.0
    container_name: sdvps-nexus-bootstrap
    user: root
    depends_on:
      - nexus
    environment:
      NEXUS_ADMIN_PASSWORD: ${NEXUS_ADMIN_PASSWORD}
      NEXUS_URL: http://nexus:8081
    volumes:
      - nexus-data:/nexus-data:ro
      - ./scripts/bootstrap-nexus.sh:/bootstrap-nexus.sh:ro
    entrypoint: ["/bin/sh", "/bootstrap-nexus.sh"]
    restart: "no"
    networks:
      - cicd

volumes:
  jenkins-data:
  nexus-data:

networks:
  cicd:

